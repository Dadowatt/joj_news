{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}JOJ Dakar 2026{% endblock %}</title>

    <!-- Bootstrap 5 & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --joj-red: #d9232e;
            --joj-gold: #ffb800;
            --joj-dark: #1a1a1a;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: #f8f9fa; }
        h1, h2, h3, .oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        /* NAVBAR STYLE DAKAR 2026 */
        .navbar-joj { background-color: var(--joj-dark); padding: 0.5rem 2rem; border-bottom: 3px solid var(--joj-gold); }
        .nav-link { color: white !important; text-transform: uppercase; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; }
        .nav-link:hover { color: var(--joj-gold) !important; }
        .nav-link.active { border-bottom: 2px solid var(--joj-red); }
        
        .btn-live { background-color: var(--joj-red); color: white; border-radius: 20px; padding: 2px 15px; font-size: 0.8rem; font-weight: bold; }
        .brand-logo img { height: 45px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-joj sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand brand-logo" href="{% url 'home' %}">
            <img src="{% static 'images/image.png' %}" alt="JOJ 2026">
        </a>
        
        <button class="navbar-toggler btn-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link active" href="{% url 'home' %}">Actualités</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Résultats</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Activités sociétales</a></li>
            </ul>
            
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger ms-2">
                            Déconnexion
                        </button>
                    </form>
                    <a href="#" class="text-white text-decoration-none small"><i class="bi bi-person-circle"></i> {{ user.username }}</a>
                    <a href="{% url 'home' %}" class="btn btn-sm btn-outline-light">Quitter</a>
                {% else %}
                    <a href="{% url 'connexion' %}" class="text-white text-decoration-none small">Connexion</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
