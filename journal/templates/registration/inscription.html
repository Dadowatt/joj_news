  {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login">

{% block content %}
 <div class="retour"> 
    <p class="register-retour my-3 mx-3">
        <a href="{% url 'home' %}" class="text-warning fs-6">← Retour à l'accueil</a>
    </p>
  </div>
<div class="container">
  <form method="POST" class="inscription w-50 mt-3 mx-auto p-4">
  {% csrf_token %}
  <h2 class="text-center text-warning fw-bold">Inscription</h2>

  <div class="d-flex justify-content-between">
    <div class="mb-3">
    <label for="{{ form.username.id_for_label }}" class="form-label text-light fw-bold">{{ form.username.label }}</label>
    {{ form.username }}
  </div>

  <div class="mb-3">
    <label for="{{ form.nom_complet.id_for_label }}" class="form-label text-light fw-bold">{{ form.nom_complet.label }}</label>
    {{ form.nom_complet }}
  </div>
  </div>

  <div class="mb-3">
    <label for="{{ form.email.id_for_label }}" class="form-label text-light fw-bold">{{ form.email.label }}</label>
    {{ form.email }}
  </div>

  <div class="d-flex justify-content-between">
    <div class="mb-3">
    <label for="{{ form.password1.id_for_label }}" class="form-label text-light fw-bold">{{ form.password1.label }}</label>
    {{ form.password1 }}
  </div>

  <div class="mb-3">
    <label for="{{ form.password2.id_for_label }}" class="form-label text-light fw-bold">{{ form.password2.label }}</label>
    {{ form.password2 }}
  </div>
  </div>

  <div class="d-flex justify-content-between">
    <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label for="exampleCheck1" class="form-check-label">Se souvenir de moi</label>
  </div>

  <div class="mb-3">
    <a href="{% url 'connexion' %}" class="text-warning fw-bold">Se Connecter</a>
  </div>
  </div>

  <button type="submit" class="btn btn-success fw-bold w-100">S'inscrire</button>
</form>
</div>
{% endblock %}
</body>
</html>
