{% extends "base.html" %}

{% block title %}Supprimer commentaire{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width:600px;">
  
  <div class="card shadow border-0 text-center">
    <div class="card-body">

      <h3 class="fw-bold text-danger mb-3">Supprimer ce commentaire ?</h3>

      <p class="text-muted">
        "{{ object.contenu }}"
      </p>

      <form method="post">
        {% csrf_token %}

        <div class="d-flex justify-content-center gap-3 mt-4">
          <a href="{{ object.article.get_absolute_url }}" class="btn btn-secondary">
            Annuler
          </a>
          <button type="submit" class="btn btn-danger fw-bold">
            Supprimer
          </button>
        </div>
      </form>

    </div>
  </div>

</div>
{% endblock %}
